name: Deploy iManage360 to EC2

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          command_timeout: 15m
          script: |
            cd /home/ubuntu/imanage360
            git pull origin main

            # Write root .env from GitHub secrets
            cat > .env <<EOF
            DB_PASSWORD=${{ secrets.DB_PASSWORD }}
            JWT_SECRET=${{ secrets.JWT_SECRET }}
            FRONTEND_URL=${{ secrets.FRONTEND_URL }}
            BACKEND_URL=${{ secrets.BACKEND_URL }}
            VAPID_EMAIL=${{ secrets.VAPID_EMAIL }}

            GATEWAY_VAPID_PUBLIC_KEY=${{ secrets.GATEWAY_VAPID_PUBLIC_KEY }}
            GATEWAY_VAPID_PRIVATE_KEY=${{ secrets.GATEWAY_VAPID_PRIVATE_KEY }}

            USER_VAPID_PUBLIC_KEY=${{ secrets.USER_VAPID_PUBLIC_KEY }}
            USER_VAPID_PRIVATE_KEY=${{ secrets.USER_VAPID_PRIVATE_KEY }}

            HR_VAPID_PUBLIC_KEY=${{ secrets.HR_VAPID_PUBLIC_KEY }}
            HR_VAPID_PRIVATE_KEY=${{ secrets.HR_VAPID_PRIVATE_KEY }}

            CRM_VAPID_PUBLIC_KEY=${{ secrets.CRM_VAPID_PUBLIC_KEY }}
            CRM_VAPID_PRIVATE_KEY=${{ secrets.CRM_VAPID_PRIVATE_KEY }}

            FLEET_VAPID_PUBLIC_KEY=${{ secrets.FLEET_VAPID_PUBLIC_KEY }}
            FLEET_VAPID_PRIVATE_KEY=${{ secrets.FLEET_VAPID_PRIVATE_KEY }}

            ASSETS_VAPID_PUBLIC_KEY=${{ secrets.ASSETS_VAPID_PUBLIC_KEY }}
            ASSETS_VAPID_PRIVATE_KEY=${{ secrets.ASSETS_VAPID_PRIVATE_KEY }}
            EOF

            # Rebuild and restart all containers
            docker-compose down
            docker-compose up -d --build
            docker image prune -f

            echo "✅ Deployment complete"
            docker ps