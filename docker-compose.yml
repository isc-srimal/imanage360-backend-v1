version: '3.8'

services:

  # ── Databases ──────────────────────────────────────────────────────────────
  mysql-user:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
      MYSQL_DATABASE: user_db
    volumes:
      - mysql_user_data:/var/lib/mysql
    networks:
      - imanage360
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-p${DB_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 5

  mysql-hr:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
      MYSQL_DATABASE: hr_db
    volumes:
      - mysql_hr_data:/var/lib/mysql
    networks:
      - imanage360
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-p${DB_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 5

  mysql-sales-crm:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
      MYSQL_DATABASE: sales_crm_db
    volumes:
      - mysql_crm_data:/var/lib/mysql
    networks:
      - imanage360
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-p${DB_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 5

  mysql-fleet-management:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
      MYSQL_DATABASE: fleet_management_db
    volumes:
      - mysql_fleet_data:/var/lib/mysql
    networks:
      - imanage360
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-p${DB_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 5

  mysql-fixed-assets:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
      MYSQL_DATABASE: fixed_assets_db
    volumes:
      - mysql_assets_data:/var/lib/mysql
    networks:
      - imanage360
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-p${DB_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Services ───────────────────────────────────────────────────────────────
  api-gateway:
    build: ./api-gateway
    restart: unless-stopped
    ports:
      - "4000:4000"
    environment:
      - PORT=4000
      - JWT_SECRET=${JWT_SECRET}
      - FRONTEND_URL=${FRONTEND_URL}
      - BACKEND_URL=${BACKEND_URL}
      - USER_SERVICE_URL=http://user-management-service:4001
      - HR_SERVICE_URL=http://hr-service:4002
      - CRM_SERVICE_URL=http://sales-crm-service:4003
      - FLEET_SERVICE_URL=http://fleet-management-service:4004
      - ASSETS_SERVICE_URL=http://fixed-assets-service:4005
      - VAPID_PUBLIC_KEY=${GATEWAY_VAPID_PUBLIC_KEY}
      - VAPID_PRIVATE_KEY=${GATEWAY_VAPID_PRIVATE_KEY}
      - VAPID_EMAIL=${VAPID_EMAIL}
    depends_on:
      - user-management-service
      - hr-service
      - sales-crm-service
      - fleet-management-service
      - fixed-assets-service
    networks:
      - imanage360

  user-management-service:
    build: ./services/user-management-service
    restart: unless-stopped
    ports:
      - "4001:4001"
    environment:
      - PORT=4001
      - USER_DB_HOST=mysql-user
      - USER_DB_PORT=3306
      - USER_DB_NAME=user_db
      - USER_DB_USER=root
      - USER_DB_PASSWORD=${DB_PASSWORD}
      - JWT_SECRET=${JWT_SECRET}
      - VAPID_PUBLIC_KEY=${USER_VAPID_PUBLIC_KEY}
      - VAPID_PRIVATE_KEY=${USER_VAPID_PRIVATE_KEY}
      - VAPID_EMAIL=${VAPID_EMAIL}
    depends_on:
      mysql-user:
        condition: service_healthy
    networks:
      - imanage360

  hr-service:
    build: ./services/hr-service
    restart: unless-stopped
    ports:
      - "4002:4002"
    environment:
      - PORT=4002
      - HR_DB_HOST=mysql-hr
      - HR_DB_PORT=3306
      - HR_DB_NAME=hr_db
      - HR_DB_USER=root
      - HR_DB_PASSWORD=${DB_PASSWORD}
      - JWT_SECRET=${JWT_SECRET}
      - VAPID_PUBLIC_KEY=${HR_VAPID_PUBLIC_KEY}
      - VAPID_PRIVATE_KEY=${HR_VAPID_PRIVATE_KEY}
      - VAPID_EMAIL=${VAPID_EMAIL}
    depends_on:
      mysql-hr:
        condition: service_healthy
    networks:
      - imanage360

  sales-crm-service:
    build: ./services/sales-crm-service
    restart: unless-stopped
    ports:
      - "4003:4003"
    environment:
      - PORT=4003
      - SALES_CRM_DB_HOST=mysql-sales-crm
      - SALES_CRM_DB_PORT=3306
      - SALES_CRM_DB_NAME=sales_crm_db
      - SALES_CRM_DB_USER=root
      - SALES_CRM_DB_PASSWORD=${DB_PASSWORD}
      - JWT_SECRET=${JWT_SECRET}
      - VAPID_PUBLIC_KEY=${CRM_VAPID_PUBLIC_KEY}
      - VAPID_PRIVATE_KEY=${CRM_VAPID_PRIVATE_KEY}
      - VAPID_EMAIL=${VAPID_EMAIL}
    depends_on:
      mysql-sales-crm:
        condition: service_healthy
    networks:
      - imanage360

  fleet-management-service:
    build: ./services/fleet-management-service
    restart: unless-stopped
    ports:
      - "4004:4004"
    environment:
      - PORT=4004
      - FLEET_DB_HOST=mysql-fleet-management
      - FLEET_DB_PORT=3306
      - FLEET_DB_NAME=fleet_management_db
      - FLEET_DB_USER=root
      - FLEET_DB_PASSWORD=${DB_PASSWORD}
      - JWT_SECRET=${JWT_SECRET}
      - VAPID_PUBLIC_KEY=${FLEET_VAPID_PUBLIC_KEY}
      - VAPID_PRIVATE_KEY=${FLEET_VAPID_PRIVATE_KEY}
      - VAPID_EMAIL=${VAPID_EMAIL}
    depends_on:
      mysql-fleet-management:
        condition: service_healthy
    networks:
      - imanage360

  fixed-assets-service:
    build: ./services/fixed-assets-service
    restart: unless-stopped
    ports:
      - "4005:4005"
    environment:
      - PORT=4005
      - ASSETS_DB_HOST=mysql-fixed-assets
      - ASSETS_DB_PORT=3306
      - ASSETS_DB_NAME=fixed_assets_db
      - ASSETS_DB_USER=root
      - ASSETS_DB_PASSWORD=${DB_PASSWORD}
      - JWT_SECRET=${JWT_SECRET}
      - VAPID_PUBLIC_KEY=${ASSETS_VAPID_PUBLIC_KEY}
      - VAPID_PRIVATE_KEY=${ASSETS_VAPID_PRIVATE_KEY}
      - VAPID_EMAIL=${VAPID_EMAIL}
    depends_on:
      mysql-fixed-assets:
        condition: service_healthy
    networks:
      - imanage360

volumes:
  mysql_user_data:
  mysql_hr_data:
  mysql_crm_data:
  mysql_fleet_data:
  mysql_assets_data:

networks:
  imanage360:
    driver: bridge